version: "3.9"

services:
  db:
    image: postgis/postgis:17-3.4
    container_name: rl_db
    environment:
      POSTGRES_DB: RightsLocker
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}

    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rluser -d rightslocker"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [app-network]

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rl_rabbit
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS}
    ports:
      - "5672:5672"
      - "${RABBIT_PORT}"   # mgmt UI at http://localhost:15672
    networks: [app-network]



  backend:
    build:
      context: ./locker
      dockerfile: Dockerfile
    container_name: rl_back
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    env_file: [.env]
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/RightsLocker
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      # Rabbit
      RABBIT_HOST: ${RABBIT_HOST}
      RABBIT_PORT: ${RABBIT_PORT}
      RABBIT_USER: ${RABBIT_USER}
      RABBIT_PASS: ${RABBIT_PASS}
      # S3/Spaces (example)
      S3_ENDPOINT: ${S3_ENDPOINT:-https://nyc3.digitaloceanspaces.com}
      S3_REGION: ${S3_REGION:-nyc3}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_ORIGINALS: ${S3_BUCKET_ORIGINALS:-rightslocker-originals}
      S3_BUCKET_HOT: ${S3_BUCKET_HOT:-rightslocker-hot}
      S3_USE_PATH_STYLE: "true"
      # JWT
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      # use wget (busybox) to avoid curl dependency
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [app-network]

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge