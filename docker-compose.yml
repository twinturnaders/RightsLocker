
services:
  db:
    image: postgis/postgis:17-3.4
    container_name: rl_db
    environment:
      POSTGRES_DB: rightslocker
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d rightslocker"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes: [ "pgdata:/var/lib/postgresql/data" ]
    networks: [ app-net ]

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rl_rabbit
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS}
    ports:
      - "15672:15672"     # UI
    networks: [ app-net ]

  # optional: one-shot flyway to apply migrations
  flyway:
    image: flyway/flyway:10
    depends_on:
      db: { condition: service_healthy }
    command: >
      -X -url=jdbc:postgresql://db:5432/rightslocker
      -user=${DB_USER} -password=${DB_PASS}
      -locations=filesystem:/flyway/sql migrate
    volumes:
      - ./db/migration:/flyway/sql:ro
    networks: [ app-net ]

  backend:
    build:
      context: ./locker
      dockerfile: Dockerfile
    container_name: rl_back
    depends_on:
      db: { condition: service_healthy }
      rabbitmq: { condition: service_started }

    environment:
      # DB
      DB_URL: jdbc:postgresql://db:5432/rightslocker
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      # S3 / Spaces
      S3_ENDPOINT: https://sfo3.digitaloceanspaces.com
      S3_REGION: sfo3
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_ORIGINALS: ${S3_BUCKET_ORIGINALS}
      S3_BUCKET_HOT: ${S3_BUCKET_HOT}
      S3_USE_PATH_STYLE: "true"
      # Rabbit
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: ${RABBIT_USER}
      RABBIT_PASS: ${RABBIT_PASS}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # Spring profile
      SPRING_PROFILES_ACTIVE: prod
    networks: [ app-net ]

  frontend:
    build:
      context: ./frontend    # Angular app folder
      dockerfile: Dockerfile # Node build -> Nginx runtime
    container_name: rl_front
    depends_on:
      backend: { condition: service_started }
    ports:
      - "80:80"              # serve at http://your-host/
    networks: [ app-net ]

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge
