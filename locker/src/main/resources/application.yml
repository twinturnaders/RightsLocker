
spring:

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  flyway:
    locations: "classpath:db/migration"
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc.lob.non_contextual_creation: true

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT}
    username: ${RABBIT_USER}
    password: ${RABBIT_PASS}

server:
  port: 8080

app:
  s3:
    endpoint: ${S3_ENDPOINT}
    region: ${S3_REGION}
    accessKey: ${S3_ACCESS_KEY}
    secretKey: ${S3_SECRET_KEY}
    bucketOriginals: ${S3_BUCKET_ORIGINALS}
    bucketHot: ${S3_BUCKET_HOT}
    bucketArchive: ${S3_BUCKET_ARCHIVE:}   # empty default is fine
    pathStyle: ${S3_USE_PATH_STYLE:true}




  mode: ${APP_MODE:processing}
  retentionHours: ${RETENTION_HOURS:24}
  storeMetadata: ${STORE_METADATA:minimal}
  attestation:
    enabled: ${ATTEST_ENABLED:true}

    hmacSecret: ${ATTEST_HMAC_SECRET:}
jwt:
    secret: ${JWT_SECRET}
    accessTtlSeconds: 900
    refreshTtlSeconds: 1209600
    issuer: rightslocker