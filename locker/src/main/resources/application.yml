spring:
datasource:
url: ${DB_URL}
username: ${DB_USER}
password: ${DB_PASS}
jpa:
ddl-auto: validate
properties:
hibernate:
dialect: org.hibernate.dialect.PostgreSQLDialect
format_sql: true
jdbc.lob.non_contextual_creation: true
jackson:
serialization:
WRITE_DATES_AS_TIMESTAMPS: false


server:
port: 8080


app:
s3:
endpoint: ${S3_ENDPOINT}
region: ${S3_REGION}
accessKey: ${S3_ACCESS_KEY}
secretKey: ${S3_SECRET_KEY}
bucketOriginals: ${S3_BUCKET_ORIGINALS}
bucketHot: ${S3_BUCKET_HOT}
bucketArchive: ${S3_BUCKET_ARCHIVE:}
pathStyle: ${S3_USE_PATH_STYLE:true}
jwt:
secret: ${JWT_SECRET:dev-secret-change}
accessTtlSeconds: 900
refreshTtlSeconds: 1209600