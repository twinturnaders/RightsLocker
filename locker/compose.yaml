services:
  postgres:
    image: 'postgres:latest'
    environment:
      url: ${DB_URL:}
      username: ${SPRING_DATASOURCE_USERNAME:capuser}
      password: ${SPRING_DATASOURCE_PASSWORD:cappass}'
    ports:
      - '5432'



  db-migrations:
          build:
            context: ./db/migration # Directory containing your Flyway Dockerfile and migrations
          environment:
            FLYWAY_URL: jdbc:postgresql://db:5432/RightsLocker
            FLYWAY_USER: ${DB_USER}
            FLYWAY_PASSWORD: ${DB_PASS}
            # Other Flyway configurations like locations
          depends_on:
            - db # Ensure the database service is up before migrations run
          networks:
            - app-network
  rabbitmq:
    image: 'rabbitmq:latest'
    environment:
      - 'RABBITMQ_DEFAULT_PASS=secret'
      - 'RABBITMQ_DEFAULT_USER=myuser'
    ports:
      - '5672'
