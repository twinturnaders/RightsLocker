<ng-container *ngIf="e as ev">
  <div class="row gap-12">
    <h2 style="margin:0">{{ev.title || 'Untitled'}}</h2>
    <rl-status-chip [value]="ev.status " />
    <span class="spacer"></span>
    <button class="btn" (click)="download()">Download</button>
  </div>


  <div class="card" style="margin-top:12px">
    <div class="row gap-16">
      <div class="preview" [style.backgroundImage]=></div>
      <div style="flex:1">
        <div class="row gap-12"><b>Captured</b><span>{{ev.capturedAt | date:'long'}}</span></div>
        <div class="row gap-12"><b>Legal hold</b>
          <label class="switch">
            <input type="checkbox" [checked]="ev.legalHold" (change)="toggleHold($event)">
            <span></span>
          </label>
        </div>
        <div class="hr"></div>
        <div class="muted"></div>
      </div>
    </div>
  </div>
</ng-container>
