<div class="container">
  <div class="auth-card">
    <h2>Create your account</h2>
    <form class="form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="label">Email</label>
      <input class="input" formControlName="email" type="email" placeholder="you@example.com" id="email">
      <div *ngIf="email.invalid && (email.dirty || email.touched)">Valid email required</div>


      <label class="label">Display name</label>
      <input class="input" formControlName="displayName" placeholder="Your name" id="displayName">


      <label class="label">Password</label>
      <input class="input" formControlName="password" type="password" placeholder="••••••••" id="password">


      <label class="label">Confirm password</label>
      <input class="input" formControlName="confirm" type="password" placeholder="••••••••" id="passwordVerify">
      <div *ngIf="form.errors?.['mismatch'] && (form.dirty || form.touched)" style="color:var(--err)">Passwords do not match</div>


      <div class="row" style="display:flex;gap:8px;align-items:center;margin-top:12px">
        <button class="btn" type="submit" [disabled]="form.invalid || loading">Create account</button>
        <a routerLink="/login" class="btn">Back to login</a>
        <span style="margin-left:auto;color:var(--err)" *ngIf="error">{{error}}</span>
        <p class="muted small">
          Already have an account?
          <a routerLink="/login">Sign in</a>
        </p>
      </div>
    </form>
  </div>
</div>
