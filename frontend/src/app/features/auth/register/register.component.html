<h2>Create your account</h2>
<form [formGroup]="form" (ngSubmit)="submit()" class="card" style="max-width:420px">
  <label>Email
    <input class="input" formControlName="email" type="email" placeholder="you@example.com">
  </label>
  <div *ngIf="email.invalid && (email.dirty || email.touched)" style="color:#fb7185">Valid email required</div>

  <label>Display name
    <input class="input" formControlName="displayName" placeholder="Your name">
  </label>

  <label>Password
    <input class="input" formControlName="password" type="password" placeholder="••••••••">
  </label>

  <label>Confirm password
    <input class="input" formControlName="confirm" type="password" placeholder="••••••••">
  </label>
  <div *ngIf="form.errors?.['mismatch'] && (form.dirty || form.touched)" style="color:#fb7185">Passwords do not match</div>

  <div class="row" style="gap:8px; margin-top:12px">
    <button class="btn primary" type="submit" [disabled]="form.invalid || loading">Create account</button>
    <a routerLink="/login" class="btn">Back to login</a>
    <span class="spacer"></span>
    <span *ngIf="error" style="color:#fb7185">{{error}}</span>
  </div>
</form>
