<div class="container auth-page">
  <div class="auth-card card stack-lg">
    <div class="page-header">
      <p class="eyebrow">Account</p>
      <h1>Create your account</h1>
      <p>Set up a RightsLocker account to retain evidence, enable legal hold, and manage share access.</p>
    </div>

    <form class="stack-md" [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-field">
        <label class="label" for="email">Email</label>
        <input class="input" formControlName="email" type="email" placeholder="you@example.com" id="email">
        <div class="error" *ngIf="email.invalid && (email.dirty || email.touched)">Valid email required.</div>
      </div>

      <div class="form-field">
        <label class="label" for="displayName">Display name</label>
        <input class="input" formControlName="displayName" placeholder="Your name" id="displayName">
      </div>

      <div class="form-field">
        <label class="label" for="password">Password</label>
        <input class="input" formControlName="password" type="password" placeholder="Enter a password" id="password">
      </div>

      <div class="form-field">
        <label class="label" for="passwordVerify">Confirm password</label>
        <input class="input" formControlName="confirm" type="password" placeholder="Confirm your password" id="passwordVerify">
        <div class="error" *ngIf="form.errors?.['mismatch'] && (form.dirty || form.touched)">Passwords do not match.</div>
      </div>

      <p class="error" *ngIf="error">{{ error }}</p>

      <div class="actions auth-actions">
        <button class="btn primary" type="submit" [disabled]="form.invalid || loading">Create account</button>
        <a routerLink="/login" class="btn secondary">Back to login</a>
      </div>

      <p class="auth-footnote">Already have an account? <a routerLink="/login">Sign in</a></p>
    </form>
  </div>
</div>
