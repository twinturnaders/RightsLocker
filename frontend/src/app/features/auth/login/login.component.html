<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
<form class="auth-card" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <h1>Sign in</h1>

  <div class="form-field">
    <div class="input-group-append">
    <span class="input-group-text">
    </span>
    </div>
    <label for="login-email">Email</label>
    <input id="login-email" type="email" formControlName="email" autocomplete="username" />
    <small class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
      Valid email required.
    </small>
  </div>
  <div class="input-group">
    <div class="input-group-prepend">
  <span class="input-group-text">
    <i class="fa fa-envelope" aria-hidden="true"></i></span>

      <div class="form-field">
        <label for="login-password">Password</label>
        <input id="login-password" [type]="fieldTextType ? 'text' : 'password'" formControlName="password" autocomplete="current-password" />

        <i class="fa fa-eye-slash" *ngIf="showEyeSlash"></i>
      </div>
    </div>
  </div>
  <p class="error" *ngIf="error">{{ error }}</p>

  <button class="btn primary" type="submit" [disabled]="loading || form.invalid">
    <span *ngIf="!loading">Sign in</span>
    <span *ngIf="loading">Signing in…</span>
  </button>

  <p class="muted small">
    Don’t have an account?
    <a routerLink="/register">Create one</a>
  </p>
</form>
