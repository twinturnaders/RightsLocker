<div class="container auth-page">
  <form class="auth-card card stack-lg" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="page-header">
      <p class="eyebrow">Account</p>
      <h1>Sign in</h1>
      <p>Access your hosted locker, legal hold controls, and evidence dashboard.</p>
    </div>

    <div class="stack-md">
      <div class="form-field">
        <label class="label" for="login-email">Email</label>
        <input id="login-email" type="email" formControlName="email" autocomplete="username" />
        <small class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Valid email required.</small>
      </div>

      <div class="form-field">
        <label class="label" for="login-password">Password</label>
        <input id="login-password" [type]="fieldTextType ? 'text' : 'password'" formControlName="password" autocomplete="current-password" />
      </div>
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <div class="stack-sm">
      <button class="btn primary" type="submit" [disabled]="loading || form.invalid">
        <span *ngIf="!loading">Sign in</span>
        <span *ngIf="loading">Signing in...</span>
      </button>
      <p class="auth-footnote">Do not have an account? <a routerLink="/register">Create one</a></p>
    </div>
  </form>
</div>
