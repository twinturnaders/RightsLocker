<section class="upload-panel card stack-lg">
  <div class="page-header">
    <h2>Upload</h2>
    <p class="section-subtitle">Add a file and generate a metadata package for download.</p>
  </div>

  <div class="stack-sm">
    <label class="label" for="anon-file">File</label>
    <input id="anon-file" type="file" (change)="pick($event)" />
  </div>

  <div class="stack-sm" *ngIf="uploading">
    <div class="progress">
      <div class="progress-bar" [style.width.%]="progress"></div>
    </div>
    <div class="status-note">{{ progress }}% uploaded</div>
  </div>

  <div class="actions">
    <button class="btn primary" (click)="start()" [disabled]="!file || uploading">Start</button>
    <button class="btn secondary" (click)="reset()" [disabled]="uploading">Reset</button>
  </div>

  <div *ngIf="readyUrl" class="panel panel-muted stack-md">
    <div class="stack-sm">
      <h3>Download</h3>
      <p class="help">Your package includes the processed media, hashes, extracted metadata, and a printable PDF report.</p>
    </div>

    <div class="actions">
      <a class="btn primary" [href]="readyUrl" target="_blank" rel="noopener">Download package</a>
      <a class="btn secondary" *ngIf="metaPdfUrl" [href]="metaPdfUrl" target="_blank" rel="noopener">View metadata PDF</a>
    </div>
  </div>
</section>
