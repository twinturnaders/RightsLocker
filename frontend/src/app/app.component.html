<div class="app">
  <!-- Header -->
  <header class="topbar" role="banner">
    <button class="iconbtn" aria-label="Toggle navigation" (click)="toggleSidebar()">
      ☰
    </button>
<span></span>
    <a class="brand" routerLink="/">
      <img class="brand-logo" src="/Rights.png" alt="RightsLocker">

    </a>
    <div class="spacer"></div>

    <form class="search" role="search" *ngIf="auth.isAuthed$ | async">
      <input type="search" placeholder="Search evidence…" aria-label="Search evidence">
    </form>

    <nav class="top-actions" aria-label="Account">
      <a *ngIf="!(auth.isAuthed$ | async)" routerLink="/login" class="btn ghost">Login</a>
      <button *ngIf="auth.isAuthed$ | async" class="btn ghost" (click)="auth.logout()">Logout</button>
    </nav>
  </header>

  <!-- Layout -->
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" [class.open]="sidebarOpen()" aria-label="Primary">
      <nav class="nav">
        <a routerLink="/upload" routerLinkActive="active" (click)="closeSidebar()">Convert</a>
        <a *ngIf="auth.isAuthed$ | async" routerLink="/evidence" routerLinkActive="active" (click)="closeSidebar()">Evidence</a>
        <a routerLink="/legal" routerLinkActive="active" (click)="closeSidebar()">Laws & Guidance</a>
        <a routerLink="/about" routerLinkActive="active" (click)="closeSidebar()">About</a>
      </nav>

      <div class="sidebar-foot">
        <p class="muted small">© 11/10/2025 RightsLocker</p>
        <p class="small">
          <a routerLink="/legal/terms">Terms</a> ·
          <a routerLink="/legal/privacy">Privacy</a>
        </p>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main" role="main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
