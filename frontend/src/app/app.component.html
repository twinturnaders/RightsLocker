<div class="app">

     <header class="topbar">
       <button class="menu-btn" aria-label="Toggle navigation" (click)="toggleSidebar()">
         <span class="menu-icon">☰</span>
       </button>

       <a class="brand" routerLink="/" (click)="closeSidebar()">
         <span class="brand-logo-bg" aria-hidden="true"></span>

       </a>

       <div class="spacer"></div>

<!--       <form class="search" *ngIf="auth.isAuthed$ | async" (submit)="$event.preventDefault()">-->
<!--         <input type="search" placeholder="Search evidence…" aria-label="Search evidence">-->
<!--       </form>-->

       <nav class="top-nav">
         <a *ngIf="!(auth.isAuthed$ | async)" routerLink="/login" class="btn ghost">Login</a>
         <button *ngIf="auth.isAuthed$ | async" class="btn ghost" (click)="auth.logout()">Logout</button>
       </nav>
     </header>

     <!-- Overlay for mobile -->
     <div class="overlay" [class.active]="sidebarOpen()" (click)="closeSidebar()" aria-hidden="true" ></div>

   <!-- Layout -->
   <div class="layout">
       <!-- Sidebar -->
       <aside class="sidebar" [class.open]="sidebarOpen()">
         <nav class="nav">
           <a routerLink="/upload" routerLinkActive="active" (click)="closeSidebar()">
             Generate Metadata Package
           </a>
           <a *ngIf="auth.isAuthed$ | async"
              routerLink="/evidence"
              routerLinkActive="active"
              (click)="closeSidebar()">
             Your Evidence
           </a>
           <a routerLink="/legal" routerLinkActive="active" (click)="closeSidebar()">
             Laws & Guidance
           </a>
           <a routerLink="/about" routerLinkActive="active" (click)="closeSidebar()">
             About
           </a>
         </nav>

         <div class="sidebar-footer">
           <p class="copyright">© 2025 RightsLocker</p>
           <p class="links">
             <a routerLink="/legal/terms" (click)="closeSidebar()">Terms</a>
             <span>·</span>
             <a routerLink="/legal/privacy" (click)="closeSidebar()">Privacy</a>
           </p>
         </div>
       </aside>

       <!-- Main content -->
       <main class="main">
         <router-outlet></router-outlet>
       </main>
     </div>

</div>
