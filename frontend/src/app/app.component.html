<div class="layout">
  <aside class="sidebar">

    <nav>

      <nav>
        <span><img src="/logo.svg"></span>
        <a routerLink="/upload" routerLinkActive="active">Convert</a>
        <a *ngIf="auth.isAuthed$ | async" routerLink="/evidence" routerLinkActive="active">Evidence</a>
      </nav>
      <a routerLink="/legal" routerLinkActive="active">Laws & Guidance</a>
      <a routerLink="/about" routerLinkActive="active">About</a>
    </nav>
  </aside>

  <section class="main">
    <header class="topbar">
      <input *ngIf="auth.isAuthed$ | async" placeholder="Search evidence…" />
      <div class="spacer"></div>
      <button *ngIf="!(auth.isAuthed$ | async)" routerLink="/login" routerLinkActive="active">Login</button>
      <button *ngIf="auth.isAuthed$ | async" (click)="auth.logout()">Logout</button>
    </header>
    <div class="content"><router-outlet></router-outlet></div>
  </section>
</div>
